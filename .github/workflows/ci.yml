name: CI Workflow - Lint, Format, and Security Checks
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install mise
        run: curl https://mise.run | sh

      - name: Activate mise in PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tools from mise.toml
        run: mise install

      - name: Run lint & typecheck (via mise)
        run: mise run lint

      - name: Check dependencies Security (high severity)
        run: pnpm audit --audit-level high

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci .