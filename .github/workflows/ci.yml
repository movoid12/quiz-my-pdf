name: CI Workflow - Lint, Format, and Security Checks
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Install Node.js 🌐
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check dependencies Security (high severity) 🔒
        run: pnpm audit --audit-level high

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci .