name: CI Workflow - Lint, Format, and Security Checks
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm 📦
        with:
          version: 10
          run_install: false

      - name: Install Node.js 🌐
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Check dependencies Security (high severity) 🔒
        run: pnpm audit --audit-level high

      - name: Install dependencies 📦
        run: pnpm install

      - name: Run lint check and format check ✅
        run: pnpm check
